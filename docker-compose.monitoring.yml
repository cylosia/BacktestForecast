# Monitoring stack — run alongside the application compose file.
#
# Usage:
#   docker compose -f docker-compose.prod.yml -f docker-compose.monitoring.yml up -d
#
# Prerequisites:
#   - Create infra/prometheus/secrets/metrics_token containing the METRICS_TOKEN value.
#   - Customize infra/alertmanager/alertmanager.yml with your receiver config.
#
# NOTE: The Grafana HealthReadyDegraded alert requires a blackbox exporter
# (probe_success metric). Add a blackbox-exporter service or disable the
# alert in infra/grafana/alerts/rules.yml.

services:
  prometheus:
    image: prom/prometheus:v2.53.0
    restart: unless-stopped
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infra/grafana/alerts/rules.yml:/etc/prometheus/rules/rules.yml:ro
      - ./ops/prometheus_alerts.yml:/etc/prometheus/rules/ops_alerts.yml:ro
      - ./infra/prometheus/secrets:/etc/prometheus/secrets:ro
      - prometheus_data:/prometheus
    networks:
      - backend
      - monitoring
    deploy:
      resources:
        limits:
          memory: 512m
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:9090/-/healthy || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  alertmanager:
    image: prom/alertmanager:v0.27.0
    restart: unless-stopped
    volumes:
      - ./infra/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    networks:
      - monitoring
    deploy:
      resources:
        limits:
          memory: 128m
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:9093/-/healthy || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  grafana:
    image: grafana/grafana:11.1.0
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD must be set}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "127.0.0.1:${GRAFANA_PORT:-3001}:3000"
    networks:
      - monitoring
    deploy:
      resources:
        limits:
          memory: 256m
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  blackbox-exporter:
    image: prom/blackbox-exporter:v0.25.0
    read_only: true
    security_opt:
      - no-new-privileges:true
    networks:
      - monitoring
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:9115/-/healthy || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    environment:
      DATA_SOURCE_NAME: ${POSTGRES_EXPORTER_DSN:?POSTGRES_EXPORTER_DSN must be set}
    networks:
      - backend
      - monitoring
    deploy:
      resources:
        limits:
          memory: 64m
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:9187/metrics || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  redis-exporter:
    image: oliver006/redis_exporter:v1.58.0
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    environment:
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD must be set}
    networks:
      - backend
      - monitoring
    deploy:
      resources:
        limits:
          memory: 64m
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:9121/metrics || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  backend:
    external: true
    # The external network name must match the main docker-compose project.
    # Override COMPOSE_PROJECT_NAME if needed.
    name: ${COMPOSE_PROJECT_NAME:-backtestforecast}_backend
  monitoring:

volumes:
  prometheus_data:
  grafana_data:
