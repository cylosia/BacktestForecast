# Canonical production alert rules for BacktestForecast.
# Grafana-specific formatted copies of overlapping alerts live in
# infra/grafana/alerts/rules.yml — keep both files in sync when editing.
groups:
  - name: backtestforecast
    rules:
      - alert: DeadLetterQueueDepth
        expr: dlq_depth > 0
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "Dead letter queue has {{ $value }} items"
          description: "The DLQ has had items for >15 minutes. Inspect via GET /admin/dlq."

      - alert: DLQDepthHigh
        expr: dlq_depth > 10
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Dead-letter queue depth >10"
          description: "{{ $value }} messages in the dead-letter queue. Tasks are exhausting retries."

      - alert: CircuitBreakerOpen
        expr: circuit_breaker_state == 2
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Circuit breaker open for {{ $labels.service }}"
          description: "The circuit breaker for {{ $labels.service }} has been open for over 2 minutes. External service may be unavailable."

      - alert: HighTaskFailureRate
        expr: |
          (
            sum(rate(celery_tasks_total{status="failed"}[5m]))
            / sum(rate(celery_tasks_total[5m]))
            > 0.1
          )
          and sum(rate(celery_tasks_total[5m])) > 0.01
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Celery task failure rate >10%"
          description: "More than 10% of Celery tasks are failing. Check worker logs."

      - alert: DuplicateTaskExecutions
        expr: rate(duplicate_task_execution_total[10m]) > 0.5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Duplicate task executions detected"
          description: "Task {{ $labels.task_name }} is being delivered multiple times."

      - alert: BillingAuditWriteFailures
        expr: increase(billing_audit_write_failures_total[10m]) > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Billing audit writes are failing"
          description: "Billing audit events are being deferred to fallback storage. Check billing.audit_write_failed logs and the drain task."

      - alert: ValidateJsonShapeWarningRateHigh
        expr: rate(validate_json_shape_warnings_total[10m]) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High validate_json_shape warning rate"
          description: "More than 1 warning/sec from validate_json_shape over the last 10 minutes. Check for schema drift or malformed payloads."

      - alert: RateLimiterMemoryCounterHigh
        expr: rate_limit_memory_counter_size > 50000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Rate limiter in-memory counter size is high"
          description: "The in-memory rate-limit fallback counter has {{ $value }} entries. This may indicate Redis is down and the fallback is accumulating unbounded state. See docs/RUNBOOK.md for remediation."

      - alert: ReaperTaskFailed
        expr: increase(celery_tasks_total{task_name="maintenance.reap_stale_jobs", status="failed"}[15m]) > 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Reaper task is failing"
          description: "The stale job reaper has failed in the last 15 minutes. Stuck jobs will not auto-recover."

      - alert: ForecastValidationErrorSpike
        expr: increase(http_requests_total{handler="/v1/forecasts", status="422"}[10m]) > 10
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Forecast validation errors spiking"
          description: "More than 10 forecast 422 errors in 10 minutes. Check dte_tolerance_days or ticker validation."

      - alert: S3ConnectionPoolExhausted
        expr: s3_connection_pool_available < 5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "S3 connection pool nearly exhausted"
          description: "Fewer than 5 S3 connections available. Check for stream leaks in export downloads."

      - alert: ReaperCycleTooSlow
        expr: histogram_quantile(0.95, rate(reaper_duration_seconds_bucket[1h])) > 300
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Reaper cycle is taking too long"
          description: "The stale job reaper p95 duration exceeded 5 minutes. Check for DB lock contention or excessive stale jobs."

      - alert: DLQDepthCritical
        expr: dlq_depth > 100
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Dead letter queue has more than 100 items"
          description: "{{ $value }} failed tasks in the DLQ. Review and replay or clear."

      - alert: CancelledJobsMissingCompletedAt
        expr: |
          (backtestforecast_jobs_cancelled_total - backtestforecast_jobs_cancelled_with_completed_at_total) > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Cancelled jobs found without completed_at timestamp"
          description: "{{ $value }} cancelled jobs are missing completed_at, indicating a billing cancellation code path issue."

      # Future enhancement: add an UpdatedAtStaleness alert once the
      # job_updated_at_seconds metric is instrumented.
      # expr: time() - max(job_updated_at_seconds) > 7200

      - alert: WorkerMemoryHigh
        expr: process_resident_memory_bytes{job="worker"} > 400 * 1024 * 1024
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Worker memory usage exceeds 400MB"
          description: "Worker {{ $labels.instance }} is using {{ $value | humanize1024 }}B. Consider increasing worker_max_memory_per_child or investigating memory leaks."

      - alert: ScanCandidateFailureRate
        expr: rate(scan_candidate_failures_total[15m]) > 5
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High scan candidate failure rate"
          description: "Scan candidates are failing at {{ $value }}/s, which may indicate a data provider outage or misconfiguration."

      - alert: WorkerHeartbeatGap
        expr: celery_workers_online < 1
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "No Celery workers detected"
          description: "No worker heartbeats found in Redis. Job processing is halted."

      - alert: DLQGrowthRate
        expr: rate(dlq_messages_total[1h]) > 0.5
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Dead-letter queue is growing"
          description: "DLQ is accumulating messages at {{ $value }} per hour, indicating persistent task failures."

      - alert: HighExternalAPIRequestRate
        expr: rate(external_api_requests_total[5m]) > 50
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High external API request rate — monitor for connection pool exhaustion"
          description: >-
            External API request rate is {{ $value | printf "%.1f" }} req/s,
            which may cause connection pool pressure.

      - alert: RedisConnectionPoolHigh
        expr: redis_pool_in_use > 40
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Redis connection pool utilization is high"
          description: >-
            {{ $value }} Redis connections are in use, approaching pool limits.

      - alert: PostgresPoolExhausted
        expr: db_pool_checked_out / (db_pool_size + db_pool_max_overflow) > 0.8
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "PostgreSQL connection pool >80% utilized"
          description: "DB pool utilization is {{ $value }}. Consider increasing pool_size or max_overflow."

      - alert: AccountDeletionStripeFailure
        expr: increase(api_errors_total{code="account_stripe_cleanup_failed"}[1h]) > 0
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Account deletion failed to clean up Stripe resources"
          description: "An account was deleted but Stripe subscription/customer cleanup failed. Check audit_events for the Stripe IDs and clean up manually in the Stripe dashboard."

      - alert: OrphanedStripeCleanupFailures
        expr: increase(external_cleanup_failures_total{resource=~"stripe_subscription|stripe_customer|stripe_cleanup_retry"}[15m]) > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Stripe orphan cleanup is failing"
          description: "Stripe cleanup failures were recorded after local account deletion. Check audit events, maintenance.cleanup_stripe_orphan task logs, and the orphaned billing cleanup runbook."

      - alert: AccountDeletionRateHigh
        expr: increase(http_requests_total{method="DELETE",path="/v1/account/me",status="204"}[1h]) > 10
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Unusually high account deletion rate"
          description: "{{ $value }} accounts deleted in the last hour. Investigate if this is expected or an abuse pattern."

      - alert: MigrationVersionDrift
        expr: migration_head_match == 0
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: "Database migration version does not match code"
          description: "The database is not at the expected Alembic head revision. Run `alembic upgrade head` to resolve."

      - alert: OutboxTableGrowth
        expr: pg_stat_user_tables_n_live_tup{relname="outbox_messages"} > 1000
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "Outbox messages table has >1000 rows"
          description: "The outbox_messages table is growing. Until the outbox poller is implemented, these rows are dead writes."

      - alert: QueuedJobsWithoutOutbox
        expr: sum(queued_jobs_without_outbox) > 0
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: "Queued jobs exist without outbox records"
          description: "At least one queued job has exceeded the dispatch SLA without an outbox record. Inspect /health/ready or /admin/dlq queue_diagnostics and consider repair_stranded_jobs."

      - alert: CreateToRunningLatencyHigh
        expr: histogram_quantile(0.95, sum by (le) (rate(job_create_to_running_latency_seconds_bucket[15m]))) > 300
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Create→running latency p95 exceeds 5 minutes"
          description: "Background jobs are taking too long to transition from created to running. Check broker health, worker capacity, and queue diagnostics."

      - alert: DiskUsageHigh
        expr: (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) < 0.15
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Disk usage above 85%"
          description: >-
            Root filesystem has only {{ $value | humanize1024 }}B available.

      - alert: DiskUsageCritical
        expr: (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) < 0.05
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Disk usage above 95% — immediate action required"
          description: >-
            Root filesystem has only {{ $value | humanize1024 }}B available.

      - alert: ContainerRestartLoop
        expr: increase(container_restart_count[30m]) > 3
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Container restarting frequently"
          description: >-
            Container {{ $labels.name }} has restarted {{ $value }} times in 30 minutes.

      - alert: StripeWebhookRetryExhaustion
        expr: increase(stripe_webhook_events_total{result="error"}[1h]) > 10
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Stripe webhook errors >10 in 1 hour"
          description: "{{ $value }} webhook processing errors. Billing state may be inconsistent."

      - alert: ExpiredExportsNotCleaned
        expr: increase(export_cleanup_deleted_total[24h]) == 0 and increase(export_jobs_created_total[24h]) > 0
        for: 25h
        labels:
          severity: warning
        annotations:
          summary: "Export cleanup has not run in 24 hours"
          description: "New exports are being created but no expired exports are being cleaned up."

      - alert: APIMemoryHigh
        expr: process_resident_memory_bytes{job="backtestforecast-api"} > 450e6
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "API process memory usage is high"
          description: >-
            API process is using {{ $value | humanize }}B of memory.
