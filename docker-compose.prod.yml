x-logging: &default-logging
  driver: json-file
  options:
    max-size: "50m"
    max-file: "5"

services:
  # IMPORTANT: Production DATABASE_URL values (set in .env.prod) MUST include
  # ?sslmode=require to encrypt Postgres traffic in transit.
  # Example: postgresql+psycopg://user:pass@host:5432/db?sslmode=require
  # The api and worker services read DATABASE_URL from .env.prod — ensure
  # sslmode=require is present there.
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: '2.0'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # SECURITY: Redis connections are unencrypted. For deployments where Redis
    # is on a separate host, enable TLS:
    # 1. Generate/obtain TLS certificates
    # 2. Add to redis.conf: tls-port 6380, tls-cert-file, tls-key-file, tls-ca-cert-file
    # 3. Update REDIS_URL to use rediss:// scheme
    # 4. Set tls=True in Redis client configuration
    command: ["sh", "-c", "echo requirepass \"$REDIS_PASSWORD\" > /tmp/redis.conf && cat /usr/local/etc/redis/redis.conf >> /tmp/redis.conf && redis-server /tmp/redis.conf"]
    volumes:
      - redis_data:/data
      - ./infra/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    networks:
      - backend
    deploy:
      resources:
        limits:
          memory: 384m
          cpus: '1.0'
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$REDIS_PASSWORD\" --no-auth-warning ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    image: ${API_IMAGE:?API_IMAGE must be set to a SHA-tagged image}
    restart: unless-stopped
    logging: *default-logging
    # Security hardening: read-only root filesystem prevents runtime modification
    # of application binaries.  no-new-privileges blocks SUID/SGID escalation.
    # cap_drop ALL removes all Linux capabilities the container doesn't need.
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:${API_PORT:-8000}:8000"
    env_file: .env.prod
    environment:
      REQUEST_MAX_BODY_BYTES: ${REQUEST_MAX_BODY_BYTES:-1048576}
    networks:
      - frontend
      - backend
    stop_grace_period: 35s
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '2.0'
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; r=urllib.request.urlopen('http://localhost:8000/health/ready'); exit(0 if r.getcode()==200 else 1)\""]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

  worker:
    image: ${WORKER_IMAGE:?WORKER_IMAGE must be set to a SHA-tagged image}
    restart: unless-stopped
    logging: *default-logging
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env.prod
    environment:
      WORKER_METRICS_BIND: "127.0.0.1"
    networks:
      - backend
    stop_grace_period: 40s
    command: >-
      celery -A apps.worker.app.celery_app.celery_app worker
      --loglevel=INFO --queues=research,exports,pipeline
      --concurrency=${CELERY_CONCURRENCY:-4}
    deploy:
      replicas: ${WORKER_REPLICAS:-2}
      resources:
        limits:
          memory: 1g
          cpus: '4.0'
    healthcheck:
      test: ["CMD", "celery", "-A", "apps.worker.app.celery_app", "inspect", "ping", "--timeout", "5"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  worker-maintenance:
    image: ${WORKER_IMAGE:?WORKER_IMAGE must be set to a SHA-tagged image}
    restart: unless-stopped
    logging: *default-logging
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env.prod
    environment:
      WORKER_METRICS_BIND: "127.0.0.1"
    networks:
      - backend
    stop_grace_period: 20s
    command: >-
      celery -A apps.worker.app.celery_app.celery_app worker
      --loglevel=INFO --queues=maintenance --concurrency=2
    deploy:
      replicas: 1
      resources:
        limits:
          memory: 512m
          cpus: '1.0'
    healthcheck:
      test: ["CMD", "celery", "-A", "apps.worker.app.celery_app", "inspect", "ping", "--timeout", "5"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  beat:
    image: ${WORKER_IMAGE:?WORKER_IMAGE must be set to a SHA-tagged image}
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp
    depends_on:
      redis:
        condition: service_healthy
    env_file: .env.prod
    networks:
      - backend
    stop_grace_period: 10s
    command: >-
      celery -A apps.worker.app.celery_app.celery_app beat
      --scheduler=redbeat.RedBeatScheduler
      --loglevel=INFO
      --pidfile=/tmp/celerybeat.pid
    deploy:
      replicas: 1
      resources:
        limits:
          memory: 256m
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/celerybeat.pid && kill -0 $(cat /tmp/celerybeat.pid)"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 30s

  web:
    image: ${WEB_IMAGE:?WEB_IMAGE must be set to a SHA-tagged image}
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "127.0.0.1:${WEB_PORT:-3000}:3000"
    env_file: .env.prod
    networks:
      - frontend
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '1.0'
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

networks:
  frontend:
  backend:

volumes:
  postgres_data:
  redis_data:
