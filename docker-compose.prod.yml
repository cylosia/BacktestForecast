services:
  # NOTE: Production deployments should configure sslmode=require in the
  # DATABASE_URL connection string (e.g. ?sslmode=require) to encrypt
  # Postgres traffic in transit. The local compose setup does not enforce
  # SSL for development convenience.
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend
    deploy:
      resources:
        limits:
          memory: 1g
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD}", "--maxmemory", "200mb", "--maxmemory-policy", "noeviction"]
    volumes:
      - redis_data:/data
    networks:
      - backend
    deploy:
      resources:
        limits:
          memory: 256m
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$REDIS_PASSWORD\" --no-auth-warning ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    image: ${API_IMAGE:-ghcr.io/backtestforecast/api:latest}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:${API_PORT:-8000}:8000"
    env_file: .env.prod
    environment:
      REQUEST_MAX_BODY_BYTES: ${REQUEST_MAX_BODY_BYTES:-1048576}
    networks:
      - frontend
      - backend
    deploy:
      resources:
        limits:
          memory: 512m
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; r=urllib.request.urlopen('http://localhost:8000/health/live'); exit(0 if r.getcode()==200 else 1)\""]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

  worker:
    image: ${WORKER_IMAGE:-ghcr.io/backtestforecast/worker:latest}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env.prod
    networks:
      - backend
    deploy:
      replicas: ${WORKER_REPLICAS:-2}
      resources:
        limits:
          memory: 1g
    healthcheck:
      test: ["CMD-SHELL", "celery -A apps.worker.app.celery_app.celery_app status --timeout 5"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

  beat:
    image: ${WORKER_IMAGE:-ghcr.io/backtestforecast/worker:latest}
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    env_file: .env.prod
    networks:
      - backend
    command: >-
      celery -A apps.worker.app.celery_app.celery_app beat
      --scheduler=redbeat.RedBeatScheduler
      --loglevel=INFO
      --pidfile=/tmp/celerybeat.pid
    deploy:
      replicas: 1
      resources:
        limits:
          memory: 256m
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/celerybeat.pid && kill -0 $(cat /tmp/celerybeat.pid)"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 30s

  web:
    image: ${WEB_IMAGE:-ghcr.io/backtestforecast/web:latest}
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "127.0.0.1:${WEB_PORT:-3000}:3000"
    env_file: .env.prod
    networks:
      - frontend
    deploy:
      resources:
        limits:
          memory: 512m
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

networks:
  frontend:
  backend:

volumes:
  postgres_data:
  redis_data:
