# Redis configuration for production.
# requirepass is injected at container startup via the docker-compose command.
# REDIS_PASSWORD must be set in the environment.

# bind 0.0.0.0 is required when Redis runs in a Docker container accessed by
# other containers on the same Docker network. If Redis is only accessed via
# localhost (e.g. co-located on the same host), change to: bind 127.0.0.1
bind 0.0.0.0
tcp-keepalive 300
timeout 300
loglevel notice

appendonly yes
# RDB snapshotting disabled — AOF provides sufficient durability for a task
# queue / cache. Removing 'save' avoids the I/O overhead of periodic RDB dumps.
# save 900 1
maxmemory 200mb
maxmemory-policy allkeys-lru

# Disable dangerous commands in production
rename-command FLUSHDB ""
rename-command FLUSHALL ""
rename-command DEBUG ""
rename-command CONFIG ""
rename-command KEYS ""
rename-command SHUTDOWN ""
rename-command SCRIPT ""
