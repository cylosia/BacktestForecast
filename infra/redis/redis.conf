# Redis configuration for production.
# requirepass is injected at container startup via the docker-compose command.
# REDIS_PASSWORD must be set in the environment.

bind 0.0.0.0
tcp-keepalive 300
timeout 0
loglevel notice

appendonly yes
maxmemory 200mb
maxmemory-policy allkeys-lru

# Disable dangerous commands in production
rename-command FLUSHDB ""
rename-command FLUSHALL ""
rename-command DEBUG ""
rename-command CONFIG ""
