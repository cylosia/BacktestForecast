global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "/etc/prometheus/rules/*.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: "backtestforecast-api"
    metrics_path: /metrics
    scheme: http
    static_configs:
      - targets: ["api:8000"]
    # In production, set METRICS_TOKEN secret and uncomment the line below:
    bearer_token_file: /etc/prometheus/secrets/metrics_token

  - job_name: "backtestforecast-worker"
    metrics_path: /metrics
    scheme: http
    scrape_interval: 30s
    static_configs:
      - targets: ["worker:9090"]
