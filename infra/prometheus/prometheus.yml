global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "/etc/prometheus/rules/*.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

scrape_configs:
  - job_name: "backtestforecast-api"
    metrics_path: /metrics
    scheme: http
    static_configs:
      - targets: ["api:8000"]
    # The /metrics endpoint requires METRICS_TOKEN in production.
    # Uncomment and set the bearer token when running in production:
    # bearer_token: "<METRICS_TOKEN>"
