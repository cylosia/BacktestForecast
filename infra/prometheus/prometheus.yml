global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "/etc/prometheus/rules/*.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: "backtestforecast-api"
    metrics_path: /metrics
    scheme: http
    static_configs:
      - targets: ["api:8000"]
    # In production, mount /etc/prometheus/secrets/metrics_token containing the
    # bearer token that matches the API's METRICS_TOKEN environment variable.
    bearer_token_file: /etc/prometheus/secrets/metrics_token

  - job_name: "backtestforecast-worker"
    metrics_path: /metrics
    scheme: http
    scrape_interval: 30s
    static_configs:
      - targets: ["worker:9090"]
    # In production, mount the same bearer_token_file as the API scrape job.
    # The worker now requires METRICS_TOKEN when it is set in the environment.
    bearer_token_file: /etc/prometheus/secrets/metrics_token
