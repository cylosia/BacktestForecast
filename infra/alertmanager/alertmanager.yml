# Alertmanager configuration.
#
# Both receivers use a generic webhook endpoint that MUST be configured via
# the ALERT_WEBHOOK_URL environment variable before deploying.
# Common targets: Opsgenie, PagerDuty webhook relay, Slack incoming webhook, or a custom service.
#
# Docs: https://prometheus.io/docs/alerting/latest/configuration/

global:
  resolve_timeout: 5m

route:
  receiver: default
  group_by: ["alertname", "severity"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

  routes:
    - match:
        severity: critical
      receiver: critical
      repeat_interval: 1h

receivers:
  - name: default
    webhook_configs:
      - url: "${ALERT_WEBHOOK_URL:-http://localhost:9095/alert}"
        send_resolved: true

  - name: critical
    webhook_configs:
      - url: "${ALERT_WEBHOOK_CRITICAL_URL:-${ALERT_WEBHOOK_URL:-http://localhost:9095/alert}}"
        send_resolved: true

inhibit_rules:
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: ["alertname"]
