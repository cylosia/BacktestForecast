# CI VALIDATION: The deploy pipeline MUST run envsubst on this file.
# If any receiver URL still contains "localhost" after processing, the
# deployment MUST fail. See .github/workflows/cd.yml for the check.
#
# Alertmanager configuration.
#
# Receiver URLs are templated for envsubst pre-processing.
# Before deploying, run:
#   envsubst < alertmanager.yml.tpl > alertmanager.yml
# or replace the URLs below with your actual webhook endpoints.
#
# Docs: https://prometheus.io/docs/alerting/latest/configuration/

global:
  resolve_timeout: 5m

route:
  receiver: default
  group_by: ["alertname", "severity"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

  routes:
    - match:
        severity: critical
      receiver: critical
      repeat_interval: 1h

receivers:
  # IMPORTANT: These URLs MUST be replaced before production deployment.
  # Option 1: Use envsubst to substitute $ALERT_WEBHOOK_URL at deploy time.
  # Option 2: Directly replace with your Opsgenie / PagerDuty / Slack webhook URL.
  # Leaving localhost URLs will cause ALL alerts to be silently lost.
  - name: default
    webhook_configs:
      - url: "${ALERT_WEBHOOK_URL:-http://ALERT-WEBHOOK-NOT-CONFIGURED.invalid/alert}"
        send_resolved: true

  - name: critical
    webhook_configs:
      - url: "${ALERT_WEBHOOK_URL_CRITICAL:-${ALERT_WEBHOOK_URL:-http://ALERT-WEBHOOK-NOT-CONFIGURED.invalid/alert}}"
        send_resolved: true

inhibit_rules:
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: ["alertname"]
