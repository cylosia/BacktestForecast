repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: check-merge-conflict

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.6
    hooks:
      - id: ruff
        args: ["--fix", "--exit-non-zero-on-fix"]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.14.1
    hooks:
      - id: mypy
        additional_dependencies:
          - "pydantic>=2.8"
          - "pydantic-settings>=2.4"
          - "sqlalchemy>=2.0"
          - "celery>=5.4"
          - "structlog>=24.4"
          - "types-redis"
          - "fastapi>=0.115"
          - "starlette>=0.41"
          - "httpx>=0.27"
          - "stripe>=10.0"
          - "boto3-stubs"
          - "sse-starlette>=2.0"
          - "prometheus-client>=0.21"
        args: ["--config-file=pyproject.toml"]
        pass_filenames: false

  - repo: local
    hooks:
      - id: schema-model-check
        name: Schema-model consistency check
        # Requires project dev dependencies to be installed (pip install -e ".[dev]")
        entry: python -m pytest tests/contract/test_schema_model_consistency.py tests/unit/test_check_constraint_naming.py -x -q
        language: system
        pass_filenames: false
        files: '(models|schemas|db/base)\.py$'
