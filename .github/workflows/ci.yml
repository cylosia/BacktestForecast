name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  # NOTE: Unit tests that touch Postgres-specific features (check constraints,
  # JSONB columns, trigger functions) need the real Postgres service below.
  # Tests that only need SQLite-compatible SQL can run without DATABASE_URL.
  backend-and-web:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: backtest_unit
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      PYTHONPATH: src:.
      APP_ENV: test
      LOG_JSON: false
      DATABASE_URL: postgresql+psycopg://test:test@localhost:5432/backtest_unit
      REDIS_URL: redis://localhost:6379/0
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_dummy
      CLERK_SECRET_KEY: sk_test_dummy
      NEXT_PUBLIC_CLERK_SIGN_IN_URL: /sign-in
      NEXT_PUBLIC_CLERK_SIGN_IN_FALLBACK_REDIRECT_URL: /app/dashboard
      NEXT_PUBLIC_CLERK_SIGN_UP_FALLBACK_REDIRECT_URL: /app/dashboard
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: '3.12'
          cache: pip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --constraint constraints.txt -e '.[dev]'

      # Load tests (tests/load/) are intended for manual execution against
      # staging infrastructure. They require a running API server and database.
      # Run manually via: locust -f tests/load/locustfile.py --headless
      # See tests/load/README.md for setup instructions.

      - name: Lint Python (ruff)
        run: python -m ruff check .

      - name: Format check Python (ruff)
        run: python -m ruff format --check .

      - name: Typecheck Python (mypy)
        run: python -m mypy src apps --ignore-missing-imports

      - name: Run Alembic migrations (for unit tests needing Postgres)
        run: alembic upgrade head

      - name: Run Python tests
        run: pytest -q -m "not integration" --ignore=tests/integration --cov=src --cov-report=term --cov-fail-under=80

      - name: Check migration chain integrity
        run: python -c "
          import pathlib, re, collections
          versions = pathlib.Path('alembic/versions')
          revs = []
          for f in sorted(versions.glob('*.py')):
              if f.name.startswith('__'): continue
              text = f.read_text()
              m = re.search(r'revision\s*=\s*\"([^\"]+)\"', text)
              if m: revs.append((m.group(1), f.name))
          counts = collections.Counter(r for r, _ in revs)
          dups = {r: c for r, c in counts.items() if c > 1}
          if dups:
              for r, c in dups.items():
                  files = [f for rev, f in revs if rev == r]
                  print(f'DUPLICATE revision {r} in: {files}')
              exit(1)
          print(f'OK: {len(revs)} unique revisions')
        "

      - name: Check service close() methods
        run: python scripts/check_service_close.py

      - name: Python compile smoke check
        run: python -m compileall src apps tests scripts

      - name: Critical entrypoint syntax check
        run: |
          python -c "import py_compile; py_compile.compile('apps/worker/app/tasks.py', doraise=True)"
          python -c "import py_compile; py_compile.compile('apps/worker/app/celery_app.py', doraise=True)"
          python -c "import py_compile; py_compile.compile('apps/api/app/main.py', doraise=True)"
          python -c "import py_compile; py_compile.compile('tests/load/locustfile.py', doraise=True)"

      - name: Import API app smoke check
        run: python -c "from apps.api.app.main import app; print(app.title)"

      - name: OpenAPI schema export smoke check
        run: python scripts/export_openapi.py > /dev/null

      - name: Check OpenAPI schema drift
        run: python scripts/check_openapi_drift.py

      - name: Check frontend types vs OpenAPI contract
        run: python scripts/check_contract_drift.py

      - name: Set up pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320  # v4.4.0
        with:
          version: 9.15.4

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: '20'
          cache: pnpm

      - name: Install web dependencies
        run: pnpm install --frozen-lockfile

      # NOTE: This check only validates the static docker-compose file. Runtime
      # env var overrides (e.g. WORKER_REPLICAS) are not caught by this check.
      - name: Verify beat single-replica
        run: |
          if ! grep -A2 'beat' docker-compose.prod.yml | grep -q 'replicas: 1'; then
            echo "ERROR: beat service must have replicas: 1"
            exit 1
          fi

      - name: Validate alertmanager config has no placeholder URLs
        run: |
          if grep -q 'localhost' infra/alertmanager/alertmanager.yml; then
            echo "WARNING: alertmanager.yml contains localhost references."
            echo "These must be replaced via envsubst before production deployment."
          fi
          if grep -q 'NOT-CONFIGURED' infra/alertmanager/alertmanager.yml; then
            echo "OK: alertmanager.yml uses NOT-CONFIGURED failsafe for unconfigured URLs."
          fi

      - name: Check generated API client types drift
        run: bash scripts/check_openapi_sync.sh

      - name: Lint web app
        run: pnpm lint:web

      - name: Typecheck web app
        run: pnpm typecheck:web

      - name: Run web unit tests
        run: pnpm --filter @backtestforecast/web test

      - name: Build web app
        run: pnpm --filter @backtestforecast/web build

  # NOTE: Integration tests run against a real Postgres 16 service container.
  # The postgres-integration job uses services: postgres: to provide DATABASE_URL.
  postgres-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      PYTHONPATH: src:.
      APP_ENV: test
      LOG_JSON: false
      DATABASE_URL: postgresql+psycopg://test:test@localhost:5432/backtest_test
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: backtest_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: '3.12'
          cache: pip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --constraint constraints.txt -e '.[dev]'

      - name: Run Alembic migrations
        run: alembic upgrade head

      - name: Check migration-model drift
        run: python scripts/check_migration_drift.py

      - name: Verify no pending Alembic migrations
        run: |
          python -c "
          from alembic.config import Config
          from alembic.script import ScriptDirectory
          from alembic.runtime.migration import MigrationContext
          from sqlalchemy import create_engine
          import os
          cfg = Config('alembic.ini')
          script = ScriptDirectory.from_config(cfg)
          engine = create_engine(os.environ['DATABASE_URL'])
          with engine.connect() as conn:
              context = MigrationContext.configure(conn)
              current = context.get_current_revision()
          head = script.get_current_head()
          assert current == head, f'Migration drift: DB at {current}, head is {head}'
          print(f'OK: DB and head both at {head}')
          "

      - name: Run integration tests against Postgres
        run: pytest tests/integration/ -q

      - name: Run billing/audit/backtest tests against Postgres
        run: pytest tests/billing/ tests/audit/ tests/backtests/ -q --ignore=tests/backtests/conftest.py
        env:
          DATABASE_URL: postgresql+psycopg://test:test@localhost:5432/backtest_test

      - name: Check duplicate updated_at triggers
        run: python scripts/check_duplicate_triggers.py

      - name: Worker task registration smoke check
        run: python scripts/check_worker_tasks.py

  dependency-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      PYTHONPATH: src:.
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: '3.12'
          cache: pip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --constraint constraints.txt -e '.[dev]'

      - name: Audit Python dependencies (pip-audit)
        run: |
          python -m pip install "pip-audit>=2.7.0,<3"
          python -m pip_audit --strict --desc

      - name: Set up pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320  # v4.4.0
        with:
          version: 9.15.4

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: '20'
          cache: pnpm

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Check Python dependency licenses
        run: pip install --constraint constraints.txt pip-licenses && pip-licenses --fail-on="GPL-3.0" --allow-only="MIT;BSD-2-Clause;BSD-3-Clause;Apache-2.0;ISC;PSF-2.0;LGPL-2.1;MPL-2.0;Python-2.0"

      - name: Audit JS dependencies (pnpm audit)
        run: pnpm audit --prod --audit-level=high

  migration-check:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      PYTHONPATH: src:.
      APP_ENV: test
      LOG_JSON: false
      DATABASE_URL: postgresql+psycopg://test:test@localhost:5432/backtest_migrate
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: backtest_migrate
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: '3.12'
          cache: pip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --constraint constraints.txt -e '.[dev]'

      - name: Run alembic upgrade head
        run: alembic upgrade head

      - name: Verify no model-migration drift
        run: alembic check

      - name: Verify alembic downgrade chain
        run: |
          alembic downgrade base
          alembic upgrade head

      - name: Verify clean state after downgrade round-trip
        run: alembic check

      - name: Check non-nullable columns have server_default
        run: python scripts/check_migration_defaults.py

      - name: Check migration heads (single head, no branches)
        run: bash scripts/check_migration_heads.sh

      - name: Check migration file naming convention
        run: |
          for f in alembic/versions/*.py; do
            basename=$(basename "$f")
            if [[ "$basename" == "__init__.py" ]] || [[ "$basename" == "README.md" ]]; then
              continue
            fi
            if ! [[ "$basename" =~ ^[0-9]{8}_[0-9]{4}_ ]]; then
              echo "ERROR: Migration file $basename does not follow naming convention YYYYMMDD_NNNN_description.py"
              exit 1
            fi
          done
          echo "All migration files follow naming convention"

  e2e-tests:
    # E2E tests run by default. To disable, set DISABLE_E2E_TESTS=true
    # as a repository variable in GitHub > Settings > Variables > Actions.
    # Requires CLERK_TESTING_TOKEN repository secret for Clerk-authenticated E2E flows.
    if: ${{ vars.DISABLE_E2E_TESTS != 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: e2e
          POSTGRES_PASSWORD: e2e
          POSTGRES_DB: e2e_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U e2e"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      CI: true
      DATABASE_URL: postgresql+psycopg://e2e:e2e@localhost:5432/e2e_test
      REDIS_URL: redis://localhost:6379/0
      CLERK_TESTING_TOKEN: ${{ secrets.CLERK_TESTING_TOKEN }}
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY || 'pk_test_dummy' }}
      CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY || 'sk_test_dummy' }}
      NEXT_PUBLIC_CLERK_SIGN_IN_URL: /sign-in
      NEXT_PUBLIC_CLERK_SIGN_IN_FALLBACK_REDIRECT_URL: /app/dashboard
      NEXT_PUBLIC_CLERK_SIGN_UP_FALLBACK_REDIRECT_URL: /app/dashboard
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320  # v4.4.0
        with:
          version: 9.15.4

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: '20'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter @backtestforecast/web exec playwright install --with-deps chromium

      - name: Build web app
        run: pnpm --filter @backtestforecast/web build

      - name: Set up Python for API server
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: '3.12'
          cache: pip

      - name: Install Python dependencies for API
        run: |
          python -m pip install --upgrade pip
          python -m pip install --constraint constraints.txt -e '.[dev]'

      - name: Run database migrations
        run: alembic upgrade head

      - name: Start API and web servers, run E2E tests
        env:
          PYTHONPATH: src:.
          APP_ENV: test
        run: |
          cd ${{ github.workspace }} && python -m uvicorn apps.api.app.main:app --host 0.0.0.0 --port 8000 &
          npx wait-on http://localhost:8000/health/live --timeout 60000
          pnpm --filter @backtestforecast/web start &
          npx wait-on http://localhost:3000 --timeout 60000
          pnpm --filter @backtestforecast/web test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: playwright-report-ci
          path: apps/web/playwright-report/
          retention-days: 7

  codeql-sast:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Initialize CodeQL
        uses: github/codeql-action/init@ff0a06e83cb2de871e5a09832bc6a81e7276941f  # v3.28.18
        with:
          languages: python, javascript

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@ff0a06e83cb2de871e5a09832bc6a81e7276941f  # v3.28.18

  trivy-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [backend-and-web]
    steps:
      # NOTE: These images are rebuilt here rather than reused from container-smoke.
      # For optimization, consider using docker save/load via artifacts.
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2  # v3.10.0

      - name: Build API image for scanning
        uses: docker/build-push-action@471d1dc4e07e5cdedd4c2171150001c434f0b7a4  # v6.15.0
        with:
          context: .
          file: apps/api/Dockerfile
          tags: backtestforecast-api:trivy
          push: false
          load: true
          cache-from: type=gha

      - name: Build Worker image for scanning
        uses: docker/build-push-action@471d1dc4e07e5cdedd4c2171150001c434f0b7a4  # v6.15.0
        with:
          context: .
          file: apps/worker/Dockerfile
          tags: backtestforecast-worker:trivy
          push: false
          load: true
          cache-from: type=gha

      - name: Run Trivy on API image
        uses: aquasecurity/trivy-action@915b19bbe73b92a6cf82a1bc12b087c9a19a5fe2  # 0.28.0
        with:
          image-ref: backtestforecast-api:trivy
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH

      - name: Run Trivy on Worker image
        uses: aquasecurity/trivy-action@915b19bbe73b92a6cf82a1bc12b087c9a19a5fe2  # 0.28.0
        with:
          image-ref: backtestforecast-worker:trivy
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH

      - name: Build Web image for scanning
        uses: docker/build-push-action@471d1dc4e07e5cdedd4c2171150001c434f0b7a4  # v6.15.0
        with:
          context: .
          file: apps/web/Dockerfile
          tags: backtestforecast-web:trivy
          push: false
          load: true
          cache-from: type=gha
          build-args: |
            NEXT_PUBLIC_APP_URL=http://localhost:3000
            NEXT_PUBLIC_API_BASE_URL=http://localhost:8000
            NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=pk_test_dummy

      - name: Run Trivy on Web image
        uses: aquasecurity/trivy-action@915b19bbe73b92a6cf82a1bc12b087c9a19a5fe2  # 0.28.0
        with:
          image-ref: backtestforecast-web:trivy
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH

  secret-scanning:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@83373cf2f8c4db6e24b41c1a9b086bb9619e9cd3  # v2.3.7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  container-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2  # v3.10.0

      - name: Build API image
        uses: docker/build-push-action@471d1dc4e07e5cdedd4c2171150001c434f0b7a4  # v6.15.0
        with:
          context: .
          file: apps/api/Dockerfile
          tags: backtestforecast-api:ci
          load: true
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Worker image
        uses: docker/build-push-action@471d1dc4e07e5cdedd4c2171150001c434f0b7a4  # v6.15.0
        with:
          context: .
          file: apps/worker/Dockerfile
          tags: backtestforecast-worker:ci
          load: true
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Web image
        uses: docker/build-push-action@471d1dc4e07e5cdedd4c2171150001c434f0b7a4  # v6.15.0
        with:
          context: .
          file: apps/web/Dockerfile
          tags: backtestforecast-web:ci
          load: true
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_APP_URL=http://localhost:3000
            NEXT_PUBLIC_API_BASE_URL=http://localhost:8000
            NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=pk_test_dummy
            NEXT_PUBLIC_CLERK_SIGN_IN_URL=/sign-in
            NEXT_PUBLIC_CLERK_SIGN_IN_FALLBACK_REDIRECT_URL=/app/dashboard
            NEXT_PUBLIC_CLERK_SIGN_UP_FALLBACK_REDIRECT_URL=/app/dashboard

      - name: Start PostgreSQL for smoke test
        run: |
          docker run -d --name ci-postgres --network host \
            -e POSTGRES_USER=smoke -e POSTGRES_PASSWORD=smoke -e POSTGRES_DB=smoke_test \
            postgres:16-alpine
          for i in $(seq 1 30); do
            docker exec ci-postgres pg_isready -U smoke -d smoke_test && break
            sleep 1
          done

      - name: Verify API container starts
        run: |
          docker run -d --name ci-api -p 8000:8000 --network host \
            -e DATABASE_URL=postgresql+psycopg://smoke:smoke@localhost:5432/smoke_test \
            -e REDIS_URL=redis://localhost:6379/0 \
            -e APP_ENV=test \
            backtestforecast-api:ci \
            sh -c "alembic upgrade head && uvicorn apps.api.app.main:app --host 0.0.0.0 --port 8000 --workers 1"
          sleep 8
          docker logs ci-api
          curl --fail --silent --max-time 5 http://localhost:8000/health/live || {
            echo "API container failed to start"
            docker logs ci-api
            exit 1
          }
          docker stop ci-api

      - name: Verify worker container starts
        run: |
          docker start ci-postgres
          for i in $(seq 1 30); do
            docker exec ci-postgres pg_isready -U smoke -d smoke_test && break
            sleep 1
          done
          docker run -d --name ci-redis --network host redis:7-alpine
          for i in $(seq 1 10); do
            docker exec ci-redis redis-cli ping | grep -q PONG && break
            sleep 1
          done
          docker run -d --name ci-worker --network host \
            -e DATABASE_URL=postgresql+psycopg://smoke:smoke@localhost:5432/smoke_test \
            -e REDIS_URL=redis://localhost:6379/0 \
            -e APP_ENV=test \
            backtestforecast-worker:ci \
            celery -A apps.worker.app.celery_app.celery_app worker --loglevel=info
          sleep 10
          if ! docker ps --filter "name=ci-worker" --filter "status=running" -q | grep -q .; then
            echo "Worker container failed to start"
            docker logs ci-worker
            exit 1
          fi
          echo "Worker container is running"
          docker stop ci-worker
          docker stop ci-redis
          docker stop ci-postgres
