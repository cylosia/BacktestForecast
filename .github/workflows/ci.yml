name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend-and-web:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: src:.
      APP_ENV: test
      LOG_JSON: false
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_dummy
      CLERK_SECRET_KEY: sk_test_dummy
      NEXT_PUBLIC_CLERK_SIGN_IN_URL: /sign-in
      NEXT_PUBLIC_CLERK_SIGN_IN_FALLBACK_REDIRECT_URL: /app/dashboard
      NEXT_PUBLIC_CLERK_SIGN_UP_FALLBACK_REDIRECT_URL: /app/dashboard
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'

      - name: Lint Python (ruff)
        run: python -m ruff check .

      - name: Run Python tests
        run: pytest -q

      - name: Check service close() methods
        run: python scripts/check_service_close.py

      - name: Python compile smoke check
        run: python -m compileall src apps tests scripts

      - name: Import API app smoke check
        run: python -c "from apps.api.app.main import app; print(app.title)"

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm

      - name: Install web dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint web app
        run: pnpm lint:web

      - name: Typecheck web app
        run: pnpm typecheck:web

      - name: Build web app
        run: pnpm --filter @backtestforecast/web build
