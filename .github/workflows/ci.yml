name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend-and-web:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: src:.
      APP_ENV: test
      LOG_JSON: false
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_dummy
      CLERK_SECRET_KEY: sk_test_dummy
      NEXT_PUBLIC_CLERK_SIGN_IN_URL: /sign-in
      NEXT_PUBLIC_CLERK_SIGN_IN_FALLBACK_REDIRECT_URL: /app/dashboard
      NEXT_PUBLIC_CLERK_SIGN_UP_FALLBACK_REDIRECT_URL: /app/dashboard
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'

      - name: Lint Python (ruff)
        run: python -m ruff check .

      - name: Typecheck Python (mypy)
        run: python -m mypy src apps --ignore-missing-imports

      - name: Run Python tests
        run: pytest -q

      - name: Check service close() methods
        run: python scripts/check_service_close.py

      - name: Python compile smoke check
        run: python -m compileall src apps tests scripts

      - name: Import API app smoke check
        run: python -c "from apps.api.app.main import app; print(app.title)"

      - name: OpenAPI schema export smoke check
        run: python scripts/export_openapi.py > /dev/null

      - name: Check OpenAPI schema drift
        run: python scripts/check_openapi_drift.py

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm

      - name: Install web dependencies
        run: pnpm install --frozen-lockfile

      - name: Check generated API client types drift
        run: |
          pnpm --filter @backtestforecast/api-client generate
          git diff --exit-code packages/api-client/src/schema.d.ts

      - name: Lint web app
        run: pnpm lint:web

      - name: Typecheck web app
        run: pnpm typecheck:web

      - name: Build web app
        run: pnpm --filter @backtestforecast/web build

  postgres-integration:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: src:.
      APP_ENV: test
      LOG_JSON: false
      DATABASE_URL: postgresql+psycopg://test:test@localhost:5432/backtest_test
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: backtest_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'

      - name: Run Alembic migrations
        run: alembic upgrade head

      - name: Check migration-model drift
        run: python scripts/check_migration_drift.py

      - name: Verify no pending Alembic migrations
        run: |
          python -c "
          from alembic.config import Config
          from alembic.script import ScriptDirectory
          from alembic.runtime.migration import MigrationContext
          from sqlalchemy import create_engine
          import os
          cfg = Config('alembic.ini')
          script = ScriptDirectory.from_config(cfg)
          engine = create_engine(os.environ['DATABASE_URL'])
          with engine.connect() as conn:
              context = MigrationContext.configure(conn)
              current = context.get_current_revision()
          head = script.get_current_head()
          assert current == head, f'Migration drift: DB at {current}, head is {head}'
          print(f'OK: DB and head both at {head}')
          "

      - name: Run integration tests against Postgres
        run: pytest tests/integration/ -q

      - name: Worker task registration smoke check
        run: python scripts/check_worker_tasks.py

  dependency-audit:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: src:.
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'

      - name: Audit Python dependencies (pip-audit)
        run: |
          python -m pip install pip-audit
          python -m pip_audit --strict --desc

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit JS dependencies (pnpm audit)
        run: pnpm audit --prod

  migration-check:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: src:.
      APP_ENV: test
      LOG_JSON: false
      DATABASE_URL: postgresql+psycopg://test:test@localhost:5432/backtest_migrate
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: backtest_migrate
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'

      - name: Run alembic upgrade head
        run: alembic upgrade head

      - name: Verify no model-migration drift
        run: alembic check

      - name: Verify alembic downgrade chain
        run: |
          alembic downgrade base
          alembic upgrade head

  e2e-tests:
    if: ${{ secrets.CLERK_TESTING_TOKEN != '' }}
    runs-on: ubuntu-latest
    env:
      CI: true
      CLERK_TESTING_TOKEN: ${{ secrets.CLERK_TESTING_TOKEN }}
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY || 'pk_test_dummy' }}
      CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY || 'sk_test_dummy' }}
      NEXT_PUBLIC_CLERK_SIGN_IN_URL: /sign-in
      NEXT_PUBLIC_CLERK_SIGN_IN_FALLBACK_REDIRECT_URL: /app/dashboard
      NEXT_PUBLIC_CLERK_SIGN_UP_FALLBACK_REDIRECT_URL: /app/dashboard
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter @backtestforecast/web exec playwright install --with-deps chromium

      - name: Build web app
        run: pnpm --filter @backtestforecast/web build

      - name: Run E2E tests
        run: pnpm --filter @backtestforecast/web test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7

  secret-scanning:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  container-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          tags: backtestforecast-api:ci
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Worker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/worker/Dockerfile
          tags: backtestforecast-worker:ci
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          tags: backtestforecast-web:ci
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_APP_URL=http://localhost:3000
            NEXT_PUBLIC_API_BASE_URL=http://localhost:8000
            NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=pk_test_dummy
            NEXT_PUBLIC_CLERK_SIGN_IN_URL=/sign-in
            NEXT_PUBLIC_CLERK_SIGN_IN_FALLBACK_REDIRECT_URL=/app/dashboard
            NEXT_PUBLIC_CLERK_SIGN_UP_FALLBACK_REDIRECT_URL=/app/dashboard
