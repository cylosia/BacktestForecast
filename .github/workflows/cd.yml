name: cd

on:
  push:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  ci-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Wait for CI to pass
        uses: lewagon/wait-on-check-action@ccfb013c15c8afb7bf2b7c028fb74dc5a068cccc  # v1.3.4
        with:
          ref: ${{ github.sha }}
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          running-workflow-name: cd
          check-regexp: "backend-and-web|postgres-integration|migration-check|container-smoke|trivy-scan|secret-scanning|dependency-audit|codeql-sast"
          wait-interval: 15
          allowed-conclusions: success

  build-and-push:
    needs: ci-gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2  # v3.10.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567  # v3.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@471d1dc4e07e5cdedd4c2171150001c434f0b7a4  # v6.15.0
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/api:${{ github.sha }},ghcr.io/${{ github.repository }}/api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Worker image
        uses: docker/build-push-action@471d1dc4e07e5cdedd4c2171150001c434f0b7a4  # v6.15.0
        with:
          context: .
          file: apps/worker/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/worker:${{ github.sha }},ghcr.io/${{ github.repository }}/worker:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Validate required CD vars
        env:
          APP_URL: ${{ vars.NEXT_PUBLIC_APP_URL }}
          API_BASE_URL: ${{ vars.NEXT_PUBLIC_API_BASE_URL }}
          CLERK_KEY: ${{ vars.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
        run: |
          if [ -z "$APP_URL" ]; then echo "::error::NEXT_PUBLIC_APP_URL is not set"; exit 1; fi
          if [ -z "$API_BASE_URL" ]; then echo "::error::NEXT_PUBLIC_API_BASE_URL is not set"; exit 1; fi
          if [ -z "$CLERK_KEY" ]; then echo "::error::NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY is not set"; exit 1; fi

      - name: Build and push Web image
        uses: docker/build-push-action@471d1dc4e07e5cdedd4c2171150001c434f0b7a4  # v6.15.0
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/web:${{ github.sha }},ghcr.io/${{ github.repository }}/web:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_APP_URL=${{ vars.NEXT_PUBLIC_APP_URL }}
            NEXT_PUBLIC_API_BASE_URL=${{ vars.NEXT_PUBLIC_API_BASE_URL }}
            NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${{ vars.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
            NEXT_PUBLIC_CLERK_SIGN_IN_URL=/sign-in
            NEXT_PUBLIC_CLERK_SIGN_IN_FALLBACK_REDIRECT_URL=/app/dashboard
            NEXT_PUBLIC_CLERK_SIGN_UP_FALLBACK_REDIRECT_URL=/app/dashboard

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: production
    steps:
      - name: Deploy to production
        run: |
          if [ -z "${{ secrets.DEPLOY_COMMAND }}" ]; then
            echo "::warning::DEPLOY_COMMAND secret is not set. Skipping deployment."
            echo "Images have been pushed. Deploy manually or configure DEPLOY_COMMAND."
            exit 0
          fi
          bash -c "${{ secrets.DEPLOY_COMMAND }}"
        env:
          IMAGE_TAG: ${{ github.sha }}

  post-deploy-smoke:
    needs: deploy
    runs-on: ubuntu-latest
    if: vars.API_PRODUCTION_URL != ''
    steps:
      - name: Health check
        id: smoke
        env:
          API_URL: ${{ vars.API_PRODUCTION_URL }}
        run: |
          echo "Checking ${API_URL}/health/live"
          curl --fail --silent --max-time 10 "${API_URL}/health/live" || exit 1
          echo "Checking ${API_URL}/health/ready"
          curl --fail --silent --max-time 10 "${API_URL}/health/ready" || exit 1
          echo "Checking ${API_URL}/v1/meta"
          curl --fail --silent --max-time 10 "${API_URL}/v1/meta" || exit 1
          # /health/ready already verifies Redis connectivity (see health router).
          # If a dedicated Redis-only smoke check is needed, add a /health/redis
          # endpoint to the API and curl it here.
          echo "All smoke checks passed."

      - name: Log in to GHCR for rollback
        if: failure() && steps.smoke.outcome == 'failure' && vars.ROLLBACK_TAG != ''
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567  # v3.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Rollback on failure
        if: failure() && steps.smoke.outcome == 'failure' && vars.ROLLBACK_TAG != ''
        env:
          ROLLBACK_TAG: ${{ vars.ROLLBACK_TAG }}
          API_URL: ${{ vars.API_PRODUCTION_URL }}
          REPO: ghcr.io/${{ github.repository }}
          DEPLOY_COMMAND: ${{ secrets.DEPLOY_COMMAND }}
        run: |
          echo "::error::Smoke check failed — rolling back to known-good tag: ${ROLLBACK_TAG}"
          set -euo pipefail

          for svc in api worker web; do
            echo "Rolling back ${svc} to ${ROLLBACK_TAG}..."
            docker pull "${REPO}/${svc}:${ROLLBACK_TAG}"
            docker tag  "${REPO}/${svc}:${ROLLBACK_TAG}" "${REPO}/${svc}:latest"
            docker push "${REPO}/${svc}:latest"
          done

          echo ""
          echo "Images re-tagged to :latest. Triggering deployment restart..."
          if [ -n "${DEPLOY_COMMAND:-}" ]; then
            bash -c "${DEPLOY_COMMAND}"
          else
            echo "::warning::DEPLOY_COMMAND variable is not configured. Rollback images were re-tagged to :latest but the running deployment was NOT restarted automatically."
            echo "::error::Manual intervention required to complete rollback."
            echo ""
            echo "To finish the rollback, run one of the following on the deployment host:"
            echo "  Docker Compose: docker compose -f docker-compose.prod.yml pull && docker compose -f docker-compose.prod.yml up -d"
            echo "  Kubernetes:     kubectl rollout undo deployment/api deployment/worker deployment/web"
            echo ""
            echo "To avoid this in future deployments, set the DEPLOY_COMMAND repository variable"
            echo "to the command that restarts your services (e.g. 'ssh deploy@host docker compose pull && docker compose up -d')."
          fi

          echo ""
          echo "Verifying health at ${API_URL}..."
          curl --fail --silent --max-time 10 "${API_URL}/health/live"  || echo "::warning::Health check /live failed after rollback"
          curl --fail --silent --max-time 10 "${API_URL}/health/ready" || echo "::warning::Health check /ready failed after rollback"
          exit 1
