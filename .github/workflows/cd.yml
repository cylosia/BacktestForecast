name: cd

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  ci-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Wait for CI to pass
        uses: lewagon/wait-on-check-action@ccfb013c15c8afb7bf2b7c028fb74dc5a068cccc  # v1.3.4
        with:
          ref: ${{ github.sha }}
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          running-workflow-name: cd
          check-regexp: "backend-and-web|postgres-integration|migration-check|container-smoke|trivy-scan|secret-scanning|dependency-audit|codeql-sast|e2e-tests"
          wait-interval: 15
          allowed-conclusions: success,skipped

  build-api:
    needs: ci-gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2  # v3.10.0
      - uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567  # v3.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push API image
        uses: docker/build-push-action@471d1dc4e07e5cdedd4c2171150001c434f0b7a4  # v6.15.0
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/api:${{ github.sha }},ghcr.io/${{ github.repository }}/api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-worker:
    needs: ci-gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2  # v3.10.0
      - uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567  # v3.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push Worker image
        uses: docker/build-push-action@471d1dc4e07e5cdedd4c2171150001c434f0b7a4  # v6.15.0
        with:
          context: .
          file: apps/worker/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/worker:${{ github.sha }},ghcr.io/${{ github.repository }}/worker:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-web:
    needs: ci-gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2  # v3.10.0
      - uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567  # v3.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Validate required CD vars
        env:
          APP_URL: ${{ vars.NEXT_PUBLIC_APP_URL }}
          API_BASE_URL: ${{ vars.NEXT_PUBLIC_API_BASE_URL }}
          CLERK_KEY: ${{ vars.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
        run: |
          if [ -z "$APP_URL" ]; then echo "::error::NEXT_PUBLIC_APP_URL is not set"; exit 1; fi
          if [ -z "$API_BASE_URL" ]; then echo "::error::NEXT_PUBLIC_API_BASE_URL is not set"; exit 1; fi
          if [ -z "$CLERK_KEY" ]; then echo "::error::NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY is not set"; exit 1; fi
      - name: Build and push Web image
        uses: docker/build-push-action@471d1dc4e07e5cdedd4c2171150001c434f0b7a4  # v6.15.0
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/web:${{ github.sha }},ghcr.io/${{ github.repository }}/web:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_APP_URL=${{ vars.NEXT_PUBLIC_APP_URL }}
            NEXT_PUBLIC_API_BASE_URL=${{ vars.NEXT_PUBLIC_API_BASE_URL }}
            NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${{ vars.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
            NEXT_PUBLIC_CLERK_SIGN_IN_URL=/sign-in
            NEXT_PUBLIC_CLERK_SIGN_IN_FALLBACK_REDIRECT_URL=/app/dashboard
            NEXT_PUBLIC_CLERK_SIGN_UP_FALLBACK_REDIRECT_URL=/app/dashboard

  # NOTE: Configure the `staging` GitHub Environment with required reviewers
  # so production cannot deploy without staging verification. See:
  # Settings → Environments → staging → Required reviewers
  deploy-staging:
    needs: [build-api, build-worker, build-web]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: staging
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: '3.12'
          cache: pip

      - name: Verify staging secrets
        env:
          _STAGING_DB: ${{ secrets.STAGING_DATABASE_URL }}
          STAGING_DEPLOY_CMD: ${{ secrets.STAGING_DEPLOY_COMMAND }}
        run: |
          if [ -z "$_STAGING_DB" ]; then
            echo "::error::STAGING_DATABASE_URL secret is not configured. Staging deployment cannot proceed."
            exit 1
          fi
          if [ -z "$STAGING_DEPLOY_CMD" ]; then
            echo "::error::STAGING_DEPLOY_COMMAND secret is not configured. Staging deployment cannot proceed."
            exit 1
          fi

      - name: Backup staging database before migration
        run: |
          if [ -n "${STAGING_DATABASE_URL}" ]; then
            TIMESTAMP=$(date +%Y%m%d_%H%M%S)
            BACKUP_FILE="staging_backup_${TIMESTAMP}.sql.gz"
            echo "Creating pre-migration backup: ${BACKUP_FILE}"
            pg_dump "${STAGING_DATABASE_URL}" | gzip > "${BACKUP_FILE}"
            echo "backup_file=${BACKUP_FILE}" >> "$GITHUB_OUTPUT"
            echo "::notice::Pre-migration backup created: ${BACKUP_FILE} ($(du -h ${BACKUP_FILE} | cut -f1))"
          else
            echo "::warning::STAGING_DATABASE_URL not set; skipping backup."
          fi
        env:
          STAGING_DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
        id: staging_backup
        continue-on-error: true

      - name: Run staging migrations
        run: |
          python -m pip install --upgrade pip
          python -m pip install --constraint constraints.txt -e '.'
          python -m alembic upgrade head
        env:
          STAGING_DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}

      - name: Validate alertmanager config
        run: |
          if [ -f "infra/alertmanager/alertmanager.yml" ]; then
            if grep -qE 'localhost|ALERT-WEBHOOK-NOT-CONFIGURED' infra/alertmanager/alertmanager.yml; then
              echo "::error::alertmanager.yml contains placeholder URLs. Run envsubst before deploying."
              exit 1
            fi
          fi

      - name: Deploy to staging
        env:
          DEPLOY_COMMAND: ${{ secrets.STAGING_DEPLOY_COMMAND }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          set -euo pipefail
          echo "Deploying images..."
          eval "${DEPLOY_COMMAND}"

      - name: Staging workflow smoke test
        env:
          API_BASE_URL: ${{ secrets.STAGING_URL }}
          SMOKE_BEARER_TOKEN: ${{ secrets.STAGING_SMOKE_BEARER_TOKEN }}
          SMOKE_ENABLE_MUTATIONS: ${{ vars.STAGING_SMOKE_ENABLE_MUTATIONS || 'false' }}
        run: |
          if [ -z "${API_BASE_URL}" ]; then
            echo "::warning::STAGING_URL not configured. Staging smoke test skipped — configure for verification."
            exit 0
          fi
          python scripts/api_smoke_workflows.py

      - name: Staging lightweight load
        env:
          LOAD_TEST_TOKEN: ${{ secrets.STAGING_LOAD_TEST_TOKEN }}
          LOAD_TEST_ENABLE_MUTATIONS: ${{ vars.STAGING_LOAD_TEST_ENABLE_MUTATIONS || 'false' }}
        run: |
          if [ -z "${LOAD_TEST_TOKEN}" ] || [ -z "${{ secrets.STAGING_URL }}" ]; then
            echo "::warning::Staging load test skipped — configure STAGING_URL and STAGING_LOAD_TEST_TOKEN to enable it."
            exit 0
          fi
          python -m pip install --upgrade pip
          python -m pip install --constraint constraints.txt locust
          locust -f tests/load/locustfile.py --headless --host "${{ secrets.STAGING_URL }}" --users 5 --spawn-rate 1 --run-time 1m --stop-timeout 15s

  deploy:
    needs: [deploy-staging]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: production
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: '3.12'
          cache: pip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --constraint constraints.txt -e '.'

      - name: Backup production database before migration
        run: |
          if [ -n "${DATABASE_URL}" ]; then
            TIMESTAMP=$(date +%Y%m%d_%H%M%S)
            BACKUP_FILE="production_backup_${TIMESTAMP}.sql.gz"
            echo "Creating pre-migration backup: ${BACKUP_FILE}"
            pg_dump "${DATABASE_URL}" | gzip > "${BACKUP_FILE}"
            echo "::notice::Pre-migration backup created: ${BACKUP_FILE} ($(du -h ${BACKUP_FILE} | cut -f1))"
          else
            echo "::error::DATABASE_URL not set; cannot backup."
            exit 1
          fi
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        id: prod_backup

      - name: Run database migrations
        run: python -m alembic upgrade head
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Verify deploy command configured
        if: env.DEPLOY_COMMAND == ''
        run: |
          echo "::error::DEPLOY_COMMAND secret is not set. Deployment skipped."
          exit 1
        env:
          DEPLOY_COMMAND: ${{ secrets.DEPLOY_COMMAND }}

      - name: Deploy canary to production
        if: vars.CANARY_DEPLOY_COMMAND != ''
        env:
          DEPLOY_COMMAND: ${{ vars.CANARY_DEPLOY_COMMAND }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          set -euo pipefail
          echo "Deploying canary images..."
          eval "${DEPLOY_COMMAND}"

      - name: Promote canary to production
        if: vars.CANARY_DEPLOY_COMMAND != '' && vars.CANARY_PROMOTE_COMMAND != ''
        env:
          DEPLOY_COMMAND: ${{ vars.CANARY_PROMOTE_COMMAND }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          set -euo pipefail
          echo "Promoting canary deployment..."
          eval "${DEPLOY_COMMAND}"

      - name: Deploy to production
        if: vars.CANARY_DEPLOY_COMMAND == ''
        env:
          DEPLOY_COMMAND: ${{ secrets.DEPLOY_COMMAND }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          set -euo pipefail
          echo "Deploying images..."
          eval "${DEPLOY_COMMAND}"

  post-deploy-smoke:
    needs: deploy
    runs-on: ubuntu-latest
    if: vars.API_PRODUCTION_URL != ''
    permissions:
      contents: read
      packages: write
    steps:
      - name: Workflow smoke check
        id: smoke
        env:
          API_BASE_URL: ${{ vars.API_PRODUCTION_URL }}
          SMOKE_BEARER_TOKEN: ${{ secrets.PRODUCTION_SMOKE_BEARER_TOKEN }}
          SMOKE_ENABLE_MUTATIONS: ${{ vars.PRODUCTION_SMOKE_ENABLE_MUTATIONS || 'false' }}
        run: python scripts/api_smoke_workflows.py

      - name: Log in to GHCR for rollback
        if: failure() && steps.smoke.outcome == 'failure' && vars.ROLLBACK_TAG != ''
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567  # v3.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check migration state before rollback
        if: failure() && steps.smoke.outcome == 'failure' && vars.ROLLBACK_TAG != ''
        env:
          REPO: ghcr.io/${{ github.repository }}
          ROLLBACK_TAG: ${{ vars.ROLLBACK_TAG }}
        run: |
          echo "Checking if the failed deployment ran migrations that differ from rollback tag..."
          set +e
          FAILED_HEADS=$(docker run --rm "${REPO}/api:${{ github.sha }}" python -m alembic heads 2>/dev/null | tr -d ' \n' || echo "unknown")
          ROLLBACK_HEADS=$(docker run --rm "${REPO}/api:${ROLLBACK_TAG}" python -m alembic heads 2>/dev/null | tr -d ' \n' || echo "unknown")
          set -e
          if [ "${FAILED_HEADS}" != "${ROLLBACK_HEADS}" ] && [ "${FAILED_HEADS}" != "unknown" ] && [ "${ROLLBACK_HEADS}" != "unknown" ]; then
            echo "::warning::Migration mismatch detected. The failed deployment ran migrations (head: ${FAILED_HEADS}) that differ from the rollback tag (head: ${ROLLBACK_HEADS})."
            echo "::warning::Do not run a schema downgrade as a default rollback step."
            echo "::warning::Review migration reversibility, identify the exact target revision, and prefer restoring from backup unless the migration is proven reversible."
          else
            echo "Migration heads match or could not be determined. Proceeding with image rollback."
          fi

      - name: Rollback on failure
        if: failure() && steps.smoke.outcome == 'failure' && vars.ROLLBACK_TAG != ''
        env:
          ROLLBACK_TAG: ${{ vars.ROLLBACK_TAG }}
          API_URL: ${{ vars.API_PRODUCTION_URL }}
          REPO: ghcr.io/${{ github.repository }}
          DEPLOY_COMMAND: ${{ secrets.DEPLOY_COMMAND }}
        run: |
          echo "::error::Smoke check failed — rolling back to known-good tag: ${ROLLBACK_TAG}"
          set -euo pipefail

          # WARNING: Do not run a schema downgrade as a default rollback step.
          # Some migrations are destructive or irreversible, so DB rollback
          # requires explicit review of migration reversibility and backup state.
          #
          # Manual steps:
          #   1. Identify the migration head expected by ROLLBACK_TAG:
          #      docker run --rm <REPO>/api:<ROLLBACK_TAG> python -m alembic heads
          #   2. Verify the currently applied DB revision:
          #      python -m alembic current
          #   3. Restore from backup or perform a reviewed downgrade only if the
          #      migration is proven reversible for this deployment.
          #   4. Then proceed with the image rollback below.

          for svc in api worker web; do
            echo "Rolling back ${svc} to ${ROLLBACK_TAG}..."
            docker pull "${REPO}/${svc}:${ROLLBACK_TAG}"
            docker tag  "${REPO}/${svc}:${ROLLBACK_TAG}" "${REPO}/${svc}:latest"
            docker push "${REPO}/${svc}:latest"
          done

          echo ""
          echo "Images re-tagged to :latest. Triggering deployment restart..."
          if [ -n "${DEPLOY_COMMAND:-}" ]; then
            eval "${DEPLOY_COMMAND}"
          else
            echo "::warning::DEPLOY_COMMAND variable is not configured. Rollback images were re-tagged to :latest but the running deployment was NOT restarted automatically."
            echo "::error::Manual intervention required to complete rollback."
            echo ""
            echo "To finish the rollback, run one of the following on the deployment host:"
            echo "  Docker Compose: docker compose -f docker-compose.prod.yml pull && docker compose -f docker-compose.prod.yml up -d"
            echo "  Kubernetes:     kubectl rollout undo deployment/api deployment/worker deployment/web"
            echo ""
            echo "To avoid this in future deployments, set the DEPLOY_COMMAND repository variable"
            echo "to the command that restarts your services (e.g. 'ssh deploy@host docker compose pull && docker compose up -d')."
          fi

          echo ""
          echo "Verifying health at ${API_URL}..."
          curl --fail --silent --max-time 10 "${API_URL}/health/live"  || echo "::warning::Health check /live failed after rollback"
          curl --fail --silent --max-time 10 "${API_URL}/health/ready" || echo "::warning::Health check /ready failed after rollback"
          exit 1
