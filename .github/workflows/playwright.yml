# Standalone Playwright E2E workflow.
#
# This workflow runs a full-stack E2E suite (API + web) on PRs that touch
# frontend or API-client code.  It overlaps with the `e2e-tests` job in
# ci.yml, which is gated behind the `ENABLE_E2E_TESTS` repository variable.
#
# Key differences from ci.yml's e2e-tests job:
#   - Triggered by path-filtered PRs (apps/web/**, packages/api-client/**)
#     and manual workflow_dispatch.
#   - Spins up the Python API server alongside the web app for true
#     full-stack coverage, whereas ci.yml's e2e-tests job only starts the
#     web frontend.
#   - Uses separate Clerk test secrets (CLERK_TEST_EMAIL / CLERK_TEST_PASSWORD).
#
# If ci.yml's e2e-tests job already ran in the same commit/PR, this workflow
# can be skipped via the concurrency group or by disabling it at the repo level.
name: Playwright E2E

on:
  pull_request:
    paths:
      - "apps/web/**"
      - "packages/api-client/**"
  workflow_dispatch:

concurrency:
  group: e2e-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320  # v4.4.0
        with:
          version: 9.15.4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter @backtestforecast/web exec playwright install --with-deps chromium

      - name: Build web app
        run: pnpm --filter @backtestforecast/web build
        env:
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          # Use the same secret names as ci.yml e2e-tests for consistency.
          # Configure NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY and CLERK_SECRET_KEY
          # in GitHub > Settings > Secrets > Actions.
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY || 'pk_test_dummy' }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY || 'sk_test_dummy' }}
          NEXT_PUBLIC_API_BASE_URL: http://localhost:8000

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install API dependencies
        run: pip install --constraint constraints.txt -e ".[s3]"

      - name: Run database migrations
        run: alembic upgrade head
        env:
          DATABASE_URL: postgresql+psycopg://test:test@localhost:5432/test

      - name: Start API server
        run: |
          uvicorn apps.api.app.main:app --host 0.0.0.0 --port 8000 &
          npx wait-on http://localhost:8000/health/live --timeout 30000
        env:
          PYTHONPATH: src:.
          APP_ENV: test
          DATABASE_URL: postgresql+psycopg://test:test@localhost:5432/test
          TEST_DATABASE_URL: postgresql+psycopg://test:test@localhost:5432/test
          REDIS_URL: redis://localhost:6379/0
          LOG_JSON: "false"

      - name: Start web app and run Playwright tests
        run: |
          pnpm --filter @backtestforecast/web start &
          npx wait-on http://localhost:3000 --timeout 60000
          pnpm --filter @backtestforecast/web test:e2e:smoke
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3000
          API_BASE_URL: http://localhost:8000
          NEXT_PUBLIC_CLERK_SIGN_IN_URL: /sign-in
          NEXT_PUBLIC_CLERK_SIGN_IN_FALLBACK_REDIRECT_URL: /app/dashboard
          NEXT_PUBLIC_CLERK_SIGN_UP_FALLBACK_REDIRECT_URL: /app/dashboard
          CLERK_TEST_EMAIL: ${{ secrets.CLERK_TEST_EMAIL }}
          CLERK_TEST_PASSWORD: ${{ secrets.CLERK_TEST_PASSWORD }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY || 'sk_test_dummy' }}
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY || 'pk_test_dummy' }}

      - name: Run authenticated full-stack Playwright subset
        if: ${{ secrets.CLERK_TEST_EMAIL != '' && secrets.CLERK_TEST_PASSWORD != '' }}
        run: pnpm --filter @backtestforecast/web test:e2e:fullstack
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3000
          API_BASE_URL: http://localhost:8000
          NEXT_PUBLIC_CLERK_SIGN_IN_URL: /sign-in
          NEXT_PUBLIC_CLERK_SIGN_IN_FALLBACK_REDIRECT_URL: /app/dashboard
          NEXT_PUBLIC_CLERK_SIGN_UP_FALLBACK_REDIRECT_URL: /app/dashboard
          CLERK_TEST_EMAIL: ${{ secrets.CLERK_TEST_EMAIL }}
          CLERK_TEST_PASSWORD: ${{ secrets.CLERK_TEST_PASSWORD }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY || 'sk_test_dummy' }}
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY || 'pk_test_dummy' }}

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: playwright-report-fullstack
          path: apps/web/playwright-report/
          retention-days: 14
