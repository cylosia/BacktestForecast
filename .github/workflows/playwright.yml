name: Playwright E2E

on:
  pull_request:
    paths:
      - "apps/web/**"
      - "packages/api-client/**"
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320  # v4.4.0
        with:
          version: 9.15.4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter @backtestforecast/web exec playwright install --with-deps chromium

      - name: Build web app
        run: pnpm --filter @backtestforecast/web build
        env:
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.CLERK_TEST_PUBLISHABLE_KEY || 'pk_test_dummy' }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_TEST_SECRET_KEY || 'sk_test_dummy' }}
          NEXT_PUBLIC_API_BASE_URL: http://localhost:8000

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.12"

      - name: Install API dependencies
        run: pip install -e ".[s3]"

      - name: Start API server
        run: |
          uvicorn apps.api.app.main:app --host 0.0.0.0 --port 8000 &
          npx wait-on http://localhost:8000/health/live --timeout 30000
        env:
          PYTHONPATH: src:.
          APP_ENV: test
          DATABASE_URL: sqlite://
          LOG_JSON: "false"

      - name: Start web app and run Playwright tests
        run: |
          pnpm --filter @backtestforecast/web start &
          npx wait-on http://localhost:3000 --timeout 60000
          pnpm --filter @backtestforecast/web test:e2e
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3000
          NEXT_PUBLIC_CLERK_SIGN_IN_URL: /sign-in
          NEXT_PUBLIC_CLERK_SIGN_IN_FALLBACK_REDIRECT_URL: /app/dashboard
          NEXT_PUBLIC_CLERK_SIGN_UP_FALLBACK_REDIRECT_URL: /app/dashboard
          CLERK_TEST_EMAIL: ${{ secrets.CLERK_TEST_EMAIL }}
          CLERK_TEST_PASSWORD: ${{ secrets.CLERK_TEST_PASSWORD }}

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 14
