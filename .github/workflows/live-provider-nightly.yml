name: live-provider-nightly

on:
  schedule:
    - cron: "30 7 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  live-provider-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: backtest_live_pytest
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      PYTHONPATH: src:.
      APP_ENV: test
      LOG_JSON: false
      DATABASE_URL: postgresql+psycopg://test:test@localhost:5432/backtest_live_pytest
      TEST_DATABASE_URL: postgresql+psycopg://test:test@localhost:5432/backtest_live_pytest
      REDIS_URL: redis://localhost:6379/0
      MASSIVE_API_KEY: ${{ secrets.MASSIVE_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: '3.12'
          cache: pip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --constraint constraints.txt -e '.[dev]'

      - name: Run Alembic migrations
        run: python -m alembic upgrade head

      - name: Run live-provider smoke suite
        run: |
          mkdir -p artifacts
          pytest -q -m "live_provider" \
            tests/integration/test_execution_service.py \
            tests/load/test_scanner_load.py \
            tests/load/test_sweep_load.py \
            tests/load/test_live_provider_reference_data.py \
            -rs \
            --junitxml=artifacts/live-provider-junit.xml

      - name: Upload live-provider artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: live-provider-smoke-artifacts
          path: |
            .pytest_cache
            artifacts/live-provider-junit.xml

  locust-load:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: ${{ vars.LOAD_TEST_BASE_URL != '' && secrets.LOAD_TEST_TOKEN != '' }}
    env:
      LOAD_TEST_BASE_URL: ${{ vars.LOAD_TEST_BASE_URL }}
      LOAD_TEST_TOKEN: ${{ secrets.LOAD_TEST_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: '3.12'
          cache: pip

      - name: Install Locust
        run: |
          python -m pip install --upgrade pip
          python -m pip install --constraint constraints.txt -e '.[dev]'

      - name: Run short authenticated locust smoke
        run: |
          mkdir -p artifacts
          locust -f tests/load/locustfile.py \
            --headless \
            -u 2 \
            -r 1 \
            -t 2m \
            --host "${LOAD_TEST_BASE_URL}" \
            --html artifacts/locust-report.html \
            --csv artifacts/locust

      - name: Enforce locust thresholds
        run: python scripts/check_locust_thresholds.py
        env:
          LOCUST_STATS_CSV: artifacts/locust_stats.csv
          LOCUST_MIN_REQUESTS: "1"
          LOCUST_MAX_FAILURES: "0"
          LOCUST_MAX_P95_MS: "2000"

      - name: Upload locust artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: locust-load-artifacts
          path: |
            artifacts/locust-report.html
            artifacts/locust*.csv
