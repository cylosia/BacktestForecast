# WARNING: The defaults below are for local development only.
# In production, override POSTGRES_USER, POSTGRES_PASSWORD, POSTGRES_DB,
# and REDIS_PASSWORD via environment variables or a .env file with strong,
# unique credentials.
services:
  postgres:
    image: postgres:16-alpine
    container_name: backtestforecast-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-backtestforecast}
      POSTGRES_USER: ${POSTGRES_USER:-backtestforecast}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-backtestforecast}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-backtestforecast} -d ${POSTGRES_DB:-backtestforecast}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512m

  redis:
    image: redis:7-alpine
    container_name: backtestforecast-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD:-devpassword}", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-devpassword}
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"${REDIS_PASSWORD:-devpassword}\" --no-auth-warning ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 384m

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: backtestforecast-api
    restart: unless-stopped
    env_file: apps/api/.env
    command: ["sh", "-c", "alembic upgrade head && uvicorn apps.api.app.main:app --host 0.0.0.0 --port 8000 --workers 1 --proxy-headers"]
    ports:
      - "127.0.0.1:${API_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health/ready')\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1g

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    container_name: backtestforecast-worker
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg://backtestforecast:backtestforecast@postgres:5432/backtestforecast
      REDIS_URL: redis://:devpassword@redis:6379/0
      REDIS_PASSWORD: devpassword
      APP_ENV: development
      LOG_LEVEL: INFO
      CELERY_CONCURRENCY: 2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1g

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_APP_URL: http://localhost:3000
        NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
        NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_ZGVsaWNhdGUtamF2ZWxpbi0yNi5jbGVyay5hY2NvdW50cy5kZXYk
        NEXT_PUBLIC_CLERK_SIGN_IN_URL: /sign-in
        NEXT_PUBLIC_CLERK_SIGN_IN_FALLBACK_REDIRECT_URL: /app/dashboard
        NEXT_PUBLIC_CLERK_SIGN_UP_FALLBACK_REDIRECT_URL: /app/dashboard
    container_name: backtestforecast-web
    restart: unless-stopped
    env_file: apps/web/.env
    ports:
      - "127.0.0.1:${WEB_PORT:-3000}:3000"
    depends_on:
      api:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512m

volumes:
  postgres_data:
  redis_data:
