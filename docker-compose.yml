services:
  postgres:
    image: postgres:16-alpine
    container_name: backtestforecast-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-backtestforecast}
      POSTGRES_USER: ${POSTGRES_USER:-backtestforecast}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-backtestforecast}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-backtestforecast} -d ${POSTGRES_DB:-backtestforecast}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: backtestforecast-redis
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD:-}"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$REDIS_PASSWORD\" --no-auth-warning ping || redis-cli ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
