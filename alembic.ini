[alembic]
script_location = alembic
prepend_sys_path = .
# The sqlalchemy.url below is a placeholder.  At runtime, alembic/env.py reads
# Settings().database_url (sourced from the DATABASE_URL environment variable)
# and calls config.set_main_option("sqlalchemy.url", ...) to override it.
#
# To point Alembic at a different database, set the DATABASE_URL env var:
#   DATABASE_URL=postgresql+psycopg://user:pass@host:5432/dbname alembic upgrade head
sqlalchemy.url = postgresql+psycopg://placeholder:placeholder@localhost/placeholder

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers = console
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
